<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Content Summarizer</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>AI-Powered Content Summarizer</h1>

    <p class="subtitle">
        Paste your article, paragraph, research paper, or any long text below.
    </p>

    <form method="POST">

        <textarea
            id="text"
            name="text"
            placeholder="Paste your text here..."
            required>{{ request.form.get('text','') }}</textarea>

        <div class="counter">
            <span>Words: <span id="wordCount">0</span></span>
            <span>Characters: <span id="charCount">0</span></span>
        </div>

        <button type="submit">
            Generate Summary
        </button>

        <button type="button" onclick="clearText()">
            Clear Text
        </button>

    </form>

    {% if summary %}

    <div class="summary">

        <h2>Generated Summary</h2>

        <textarea
            id="summaryText"
            readonly>{{ summary }}</textarea>

        <br><br>

        <button type="button" onclick="copySummary()">
            Copy Summary
        </button>

    </div>

    {% endif %}

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
